#!KAMAILIO

# S1 PoT — minimal Kamailio proxy. Same config runs on both nodes
# (kamailio-primary + kamailio-standby); failover semantics are handled
# at the UAC layer by SIPp re-pointing at the standby after primary is
# paused. Production deployments would add keepalived/VRRP for a shared
# VIP — that's deployment-tier and out of S1's scope (see README).

####### Global Parameters #########

debug = 2
log_stderror = yes
log_facility = LOG_LOCAL0
fork = yes
children = 2
auto_aliases = no
listen = udp:0.0.0.0:5060

####### Modules #########

loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "kex.so"
loadmodule "ctl.so"
loadmodule "dispatcher.so"

# The ctl module's default unix socket lives at /var/run/kamailio/
# which the Debian/Ubuntu package's tmpfiles config creates at boot
# only when kamailio runs under systemd. Inside the container we
# create it explicitly via the Dockerfile (see kamailio-image/).

# Dispatcher: OPTIONS-pings the downstream Asterisk every 5 s and
# marks it inactive on three consecutive failures. The standby
# Kamailio runs the same config, so during the failover window only
# the primary's INVITEs are interrupted — the standby's view of
# downstream health is identical.

modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")
modparam("dispatcher", "flags", 2)
modparam("dispatcher", "ds_ping_interval", 5)
modparam("dispatcher", "ds_probing_mode", 1)
modparam("dispatcher", "ds_ping_method", "OPTIONS")
modparam("dispatcher", "ds_ping_from", "sip:kamailio@s1")

####### Routing #########

request_route {

    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (!sanity_check("1511", "7")) {
        xlog("L_WARN", "Malformed SIP message from $si:$sp\n");
        exit;
    }

    # In-dialog requests (ACK, BYE) handled first. SIPp sends them
    # to whatever destination it originally connected to (this proxy),
    # so we must forward to the dispatched Asterisk downstream. We
    # don't use record_route() because binding to 0.0.0.0 would put a
    # `Record-Route: <sip:0.0.0.0;lr>` into the 2xx and break the ACK
    # path; instead we re-dispatch the ACK/BYE to the same Asterisk
    # the initial INVITE was routed to. (For Layer 2 with rtpengine we
    # would add record_route() + an explicit `listen=udp:<advertised>`.)
    if (has_totag()) {
        if (!loose_route()) {
            # No Route header (expected — no record_route in this PoT).
            # Re-dispatch to Asterisk so the ACK/BYE reaches the UAS.
            ds_select_dst("1", "4");
        }
        t_relay();
        exit;
    }

    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            t_relay();
        }
        exit;
    }

    if (is_method("INVITE|MESSAGE|REGISTER|OPTIONS")) {
        if (!ds_select_dst("1", "4")) {
            xlog("L_ERR", "No available downstream for $rm from $si\n");
            sl_send_reply("503", "No available targets");
            exit;
        }
        t_relay();
        exit;
    }

    sl_send_reply("405", "Method Not Allowed");
}
