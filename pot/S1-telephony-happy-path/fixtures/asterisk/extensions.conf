; S1 PoT — single test extension for the failover + screen-pop probe.
;
; Flow:
;   Kamailio → INVITE to sip:9999@asterisk → matches extension 9999
;   Answer() runs before Stasis() (S3 lesson — without it a channel
;   half-way into Stasis never gets reported in /ari/applications/<app>).
;   Stasis(s1-test, ${CALLERID(num)}) hands the channel to the NestJS
;   subscriber. The subscriber records (event_arrival_ms, callerid) to
;   JSONL — callerid is the SIPp-generated call_id used as the join
;   key in summarise.sh.

; The ARI subscriber answers the channel from inside Stasis instead
; of dialplan calling Answer() first. Reason: PJSIP's chan_pjsip
; Answer() waits ~500 ms for the SDP/ACK round-trip to settle before
; returning to the dialplan, which would dominate the screen-pop
; latency measurement. By entering Stasis on a not-yet-answered
; channel and answering from the subscriber, we measure the actual
; "INVITE arrival → ARI app notified" latency, which is the property
; the screen-pop budget tracks.
[s1-test]
exten => 9999,1,NoOp(S1 call cid=${CALLERID(num)})
 same => n,Stasis(s1-test,${CALLERID(num)})
 same => n,Hangup()
