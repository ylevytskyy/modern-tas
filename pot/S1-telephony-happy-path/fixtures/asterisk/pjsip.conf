; S1 PoT — PJSIP transport + anonymous endpoint so Kamailio (and SIPp,
; if it bypasses Kamailio for diagnostics) can hand off INVITEs.
;
; The endpoint_identifier_order is the S2 lesson: without "anonymous"
; in the list, the first INVITE from an un-registered source is rejected
; with "No matching endpoint found" even when an [anonymous] endpoint
; section exists.

[global]
endpoint_identifier_order = ip,username,anonymous

[transport-udp]
type             = transport
protocol         = udp
bind             = 0.0.0.0:5060

; Anonymous endpoint catches everything that didn't match by IP or user.
; Acceptable for a PoT; production replaces this with explicit per-tenant
; trunks.
[anonymous]
type             = endpoint
context          = s1-test
disallow         = all
allow            = ulaw
allow            = alaw
direct_media     = no
