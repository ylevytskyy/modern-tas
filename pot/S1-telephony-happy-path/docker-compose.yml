# S1 PoT — Layer 1 (signaling-only): validates Kamailio failover +
# screen-pop. Media (rtpengine + RTP smoke) is Layer 2 and only added
# after Layer 1 is Green.
#
# Topology:
#   sipp (UAC, run-on-demand) → kamailio-primary | kamailio-standby
#       → asterisk → Stasis(s1-test) → subscriber (ARI WS)
#
# All services share the default bridge network and reach each other
# via service-name DNS. No host port publishing — the test driver
# (sipp) runs inside the network. macOS-friendly (no network_mode=host).

services:

  asterisk:
    image: pot-s1/asterisk:local
    build:
      context: ./asterisk-image
    volumes:
      - ./fixtures/asterisk:/etc/asterisk:ro
    healthcheck:
      test: ["CMD-SHELL", "asterisk -rx 'core show uptime' | grep -q 'System uptime'"]
      interval: 5s
      timeout: 3s
      retries: 12

  kamailio-primary:
    image: pot-s1/kamailio:local
    build:
      context: ./kamailio-image
    depends_on:
      asterisk:
        condition: service_healthy
    volumes:
      - ./fixtures/kamailio/kamailio.cfg:/etc/kamailio/kamailio.cfg:ro
      - ./fixtures/kamailio/dispatcher.list:/etc/kamailio/dispatcher.list:ro
    healthcheck:
      test: ["CMD", "kamcmd", "core.uptime"]
      interval: 5s
      timeout: 2s
      retries: 10

  kamailio-standby:
    image: pot-s1/kamailio:local
    build:
      context: ./kamailio-image
    depends_on:
      asterisk:
        condition: service_healthy
    volumes:
      - ./fixtures/kamailio/kamailio.cfg:/etc/kamailio/kamailio.cfg:ro
      - ./fixtures/kamailio/dispatcher.list:/etc/kamailio/dispatcher.list:ro
    healthcheck:
      test: ["CMD", "kamcmd", "core.uptime"]
      interval: 5s
      timeout: 2s
      retries: 10

  subscriber:
    image: pot-s1/subscriber:local
    build:
      context: ./subscriber
    depends_on:
      asterisk:
        condition: service_healthy
    environment:
      ARI_HOST: asterisk
      ARI_PORT: "8088"
      ARI_USER: pot
      ARI_PASS: pot
      ARI_APP:  s1-test
      OUT_FILE: /work/subscriber.jsonl
    volumes:
      - subscriber-data:/work

  # SIPp runs on-demand via `docker compose run`. Listed as a service
  # so it inherits the network + can resolve kamailio-primary/standby
  # by name. `profiles: [tools]` keeps it out of `docker compose up`.
  sipp:
    image: pot-s1/sipp:local
    build:
      context: ./sipp-image
    profiles: ["tools"]
    networks:
      - default

volumes:
  subscriber-data:
