# pjsua config — bob (extension 1002 in pot/S9-audio-loopback)
# Matches the [bob] endpoint/auth/aor in
# pot/S9-audio-loopback/asterisk-image/pjsip.conf

--id=sip:bob@127.0.0.1
--registrar=sip:127.0.0.1:5060
--realm=*
--username=bob
--password=bob-s9-pot

# pjsua's SIP listener. 5071 to stay clear of Asterisk (5060) and alice (5070).
--local-port=5071

--no-tcp
--auto-update-nat=1
--add-codec=PCMU

# Disable every codec except PCMU (and telephone-event which pjsua keeps
# automatically). Without this pjsua enables all codecs by default — speex,
# iLBC, GSM, PCMA, G722 — which bloats the SDP and can push the authenticated
# INVITE over 1300 B even with compact headers.
# Codec names come from `pjsua Cp` list (format: name/rate/channels).
--dis-codec=speex/16000
--dis-codec=speex/8000
--dis-codec=speex/32000
--dis-codec=iLBC
--dis-codec=GSM
--dis-codec=PCMA
--dis-codec=G722

# Compact-form SIP headers (c:/f:/t:/i:/m: instead of Contact:/From:/To:…).
# Belt-and-suspenders with --dis-codec above: keeps non-SDP header bloat low.
--use-compact-form

# Highest practical log verbosity — every SIP message in/out with bodies,
# transport events, RTP stats, transaction state, registration timer.
--log-level=5
--app-log-level=5
