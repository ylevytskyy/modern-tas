# pjsua config — bob (extension 1002 in pot/S9-audio-loopback)
# Matches the [bob] endpoint/auth/aor in
# pot/S9-audio-loopback/asterisk-image/pjsip.conf

--id=sip:bob@127.0.0.1
--registrar=sip:127.0.0.1:5060
--realm=*
--username=bob
--password=bob-s9-pot

# pjsua's SIP listener. 5071 to stay clear of Asterisk (5060) and alice (5070).
--local-port=5071

--no-tcp
--auto-update-nat=1
--add-codec=PCMU

# Compact-form SIP headers (c:/f:/t:/i:/m: instead of Contact:/From:/To:…).
# Required: authenticated INVITEs exceed pjsua's 1300-byte UDP threshold
# without this, leading to silent drops at the SIP layer. Verified during
# Task 12 e2e — auth INVITE was 1546 bytes, dropped to 1297 with this flag.
--use-compact-form

# Highest practical log verbosity — every SIP message in/out with bodies,
# transport events, RTP stats, transaction state, registration timer.
--log-level=5
--app-log-level=5
