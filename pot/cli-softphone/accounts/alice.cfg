# pjsua config — alice (extension 1001 in pot/S9-audio-loopback)
# Matches the [alice] endpoint/auth/aor in
# pot/S9-audio-loopback/asterisk-image/pjsip.conf

--id=sip:alice@127.0.0.1
--registrar=sip:127.0.0.1:5060
--realm=*
--username=alice
--password=alice-s9-pot

# pjsua's SIP listener — must not collide with Asterisk on 5060.
# Convention: alice 5070, bob 5071, future accounts 5072+.
--local-port=5070

# Force the ALSA `pulse` plugin (index 6 in pjsua's enumeration) so audio
# routes through PipeWire's PulseAudio compat layer. With the default
# (auto -1), pjsua opens the `lavrate` ALSA plug which terminates at
# `hw:CARD=PCH,DEV=0` — exclusive access — and a second simultaneous
# pjsua instance can't open it (EBUSY). Both alice and bob configs MUST
# share this override so they cooperate via PipeWire's mixer.
#
# Linux-specific. On macOS the indices differ; the `pulse` plugin
# probably isn't even present. Future portability work: discover the
# right index at startup instead of hard-coding (see cli-softphone
# follow-up TODO).
--capture-dev=6
--playback-dev=6

# UDP only — matches S9 transport-udp.
--no-tcp

# rport/Via-derived NAT detection (no STUN needed on loopback).
--auto-update-nat=1

# PCMU is what the S9 Asterisk endpoints allow (allow=ulaw).
--add-codec=PCMU

# Disable every codec except PCMU (and telephone-event which pjsua keeps
# automatically). Without this pjsua enables all codecs by default — speex,
# iLBC, GSM, PCMA, G722 — which bloats the SDP from ~297 B to ~545 B and
# pushes the authenticated INVITE over 1300 B even with compact headers.
# Verified: auth INVITE drops from 1306 B to 1056 B with these flags.
# Codec names come from `pjsua Cp` list (format: name/rate/channels).
--dis-codec=speex/16000
--dis-codec=speex/8000
--dis-codec=speex/32000
--dis-codec=iLBC
--dis-codec=GSM
--dis-codec=PCMA
--dis-codec=G722

# Compact-form SIP headers (c:/f:/t:/i:/m: instead of Contact:/From:/To:…).
# Belt-and-suspenders with --dis-codec above: keeps non-SDP header bloat low.
--use-compact-form

# Highest practical log verbosity — every SIP message in/out with bodies,
# transport events, RTP stats, transaction state, registration timer.
--log-level=5
--app-log-level=5
