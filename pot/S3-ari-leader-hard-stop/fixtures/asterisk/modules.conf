; S3 PoT — autoload but disable channel drivers we don't need. PJSIP is
; left enabled (autoload) but the absence of pjsip.conf means it won't
; bind any transport; the spike drives Stasis with Local channels via ARI.
[modules]
autoload = yes
noload => chan_alsa.so
noload => chan_oss.so
noload => chan_console.so
noload => chan_dahdi.so
noload => chan_iax2.so
noload => chan_sip.so
noload => chan_mgcp.so
noload => chan_skinny.so
noload => chan_unistim.so
noload => res_smdi.so
noload => app_dahdiras.so
noload => app_meetme.so
