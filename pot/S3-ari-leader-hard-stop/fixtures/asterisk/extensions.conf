; S3 PoT — Local channel target for the chaos test. The run-test.sh
; script POSTs /ari/channels to create N channels into Stasis(pot-leader-test).
;
; The "sleep" extension just waits a long time so the channel persists
; while we measure leader-A's close-latency and leader-B's orphan
; reconciliation.
[s3-test]
exten => sleep,1,NoOp(S3 test channel ${CHANNEL})
 same => n,Answer()
 same => n,Wait(120)
 same => n,Hangup()
