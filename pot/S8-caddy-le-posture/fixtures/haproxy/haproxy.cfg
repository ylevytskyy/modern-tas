# S8 — HAProxy 3.0 TCP-mode SNI rate-limit front of Caddy.
#
# ADR-0019 architecture: HAProxy trips before Caddy when a source IP
# floods unknown SNIs > 1k/sec. Known-SNI traffic and known-SNI
# floods are not rate-limited (they hit Caddy's existing cert).
#
# Mechanism:
#   1. Frontend in TCP mode passes through TLS; we don't terminate.
#   2. `tcp-request inspect-delay 5s` lets SNI bytes arrive.
#   3. Per-source stick-table records GPC0 hits/sec.
#   4. GPC0 is incremented only when SNI is NOT in the allow-list.
#   5. If the per-source GPC0 rate exceeds 1000/sec → reject.
#
# Note: we don't preserve client IP to Caddy via PROXY protocol; for the
# spike's hazard (unknown-SNI flood from one source) that's fine — Caddy
# sees HAProxy's IP, which is enough to measure storage thrash from
# Caddy's side independent of source.

global
    log stdout format raw local0 info
    maxconn 50000
    nbthread 2

defaults
    log     global
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    timeout tunnel  1h

# ---- Stats endpoint (CSV scraped by the test runner every 5s) ----
frontend stats
    bind :8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
    stats admin if TRUE
    # CSV export at /stats;csv
    http-request use-service prometheus-exporter if { path /metrics }

# ---- TLS passthrough with SNI rate-limit ----
frontend tls_passthrough
    bind :443
    mode tcp
    log global
    option tcplog

    tcp-request inspect-delay 5s

    # Stick-table: track GPC0 rate per source IP over a 1s window.
    stick-table type ip size 100k expire 60s store gpc0_rate(1s)

    acl known_sni      req.ssl_sni -i tenant-known.spike-s8.test
    acl is_tls_hello   req.ssl_hello_type 1
    # Threshold is 800/sec for the PoT (macOS Docker caps k6 at ~1000/sec,
    # so the original 1000/sec production threshold can't be exceeded in
    # this environment). 800/sec validates the mechanism — the production
    # threshold stays at the ADR-0019 value; this PoT proves the wiring.
    acl src_unk_flood  sc_gpc0_rate(0) gt 800

    # Bind the connection's source to stick-table counter 0.
    # Must come before the GPC0 increment so the counter is valid.
    tcp-request content track-sc0 src if is_tls_hello

    # Increment GPC0 only for unknown SNIs.
    tcp-request content sc-inc-gpc0(0) if is_tls_hello !known_sni

    # Reject if this source is in unknown-SNI-flood state.
    tcp-request content reject if is_tls_hello !known_sni src_unk_flood

    # Accept only after tracking/incrementing/rejecting are done.
    tcp-request content accept if is_tls_hello

    default_backend caddy_tls

backend caddy_tls
    mode tcp
    option tcp-check
    tcp-check connect port 80
    server caddy1 caddy:443 check port 80 inter 5s rise 2 fall 3
