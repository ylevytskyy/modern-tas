; S9 audio-loopback — static PJSIP config for two Mac softphones.
;
; macOS Docker Desktop note: containers see the softphone source IP as
; the Docker bridge gateway (e.g. 172.17.0.1 / 172.21.0.1) rather than
; 127.0.0.1. external_signaling_address + external_media_address tell
; Asterisk what IP to advertise to the softphone in SDP / Via; on the
; Mac side both legs round-trip through 127.0.0.1 since Docker
; publishes 5060 + the RTP range to host ports.

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_signaling_address=127.0.0.1
external_media_address=127.0.0.1
local_net=172.16.0.0/12
local_net=192.168.0.0/16
local_net=10.0.0.0/8

;-----------------------------------------------------------------------
; alice — extension 1001
;-----------------------------------------------------------------------

[alice]
type=endpoint
context=tas-loopback
disallow=all
allow=ulaw
auth=alice-auth
aors=alice-aor
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[alice-auth]
type=auth
auth_type=userpass
username=alice
password=alice-s9-pot

[alice-aor]
type=aor
max_contacts=1
remove_existing=yes

;-----------------------------------------------------------------------
; bob — extension 1002
;-----------------------------------------------------------------------

[bob]
type=endpoint
context=tas-loopback
disallow=all
allow=ulaw
auth=bob-auth
aors=bob-aor
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[bob-auth]
type=auth
auth_type=userpass
username=bob
password=bob-s9-pot

[bob-aor]
type=aor
max_contacts=1
remove_existing=yes
