; S9 audio-loopback dialplan.
;
; 1001 → alice; 1002 → bob. No queues, no MOH, no transfers. Dial-and-hang-up.

[tas-loopback]

exten => 1001,1,NoOp(S9 — dial alice from ${CALLERID(all)})
 same => n,Dial(PJSIP/alice,30)
 same => n,Hangup()

exten => 1002,1,NoOp(S9 — dial bob from ${CALLERID(all)})
 same => n,Dial(PJSIP/bob,30)
 same => n,Hangup()

; 600 → Echo() self-test. Single-softphone "hear yourself" probe; not
; part of the S9 happy-path gates (G1–G5), added for solo bench testing.
exten => 600,1,NoOp(S9 — echo self-test from ${CALLERID(all)})
 same => n,Answer()
 same => n,Echo()
 same => n,Hangup()
