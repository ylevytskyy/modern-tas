services:
  asterisk:
    build: ./asterisk-image
    image: pot-s9/asterisk:local
    container_name: s9-asterisk
    ports:
      - "5060:5060/udp"
      - "10000-10010:10000-10010/udp"
    volumes:
      - ./asterisk-image/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./asterisk-image/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./asterisk-image/rtp.conf:/etc/asterisk/rtp.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 5s
