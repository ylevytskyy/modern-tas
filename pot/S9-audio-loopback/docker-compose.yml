services:
  asterisk:
    build: ./asterisk-image
    image: pot-s9/asterisk:local
    container_name: s9-asterisk
    ports:
      - "5060:5060/udp"
      - "10000-10010:10000-10010/udp"
    # Configs baked into the image (see asterisk-image/Dockerfile) so the
    # stack works under Docker Desktop on Linux hosts whose project path
    # isn't on the shared-folder list. `make up` rebuilds on every boot,
    # so config edits don't require an explicit rebuild.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 5s

  sipp:
    build: ./sipp-image
    image: pot-s9/sipp:local
    profiles: ["probe"]
    depends_on:
      asterisk:
        condition: service_healthy
    volumes:
      - ./scenarios:/scenarios:ro
    working_dir: /tmp
