# S2 — queue dequeue latency. Boots Postgres + Redis + NATS + arbiter + Asterisk;
# operator-sim and SIPp run on demand under the `driver` profile.

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: pot
      POSTGRES_DB: pot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 2s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "8222:8222"  # monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 5

  asterisk:
    build: ./asterisk-image
    volumes:
      - ./fixtures/asterisk:/etc/asterisk:ro
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD-SHELL", "asterisk -rx 'core show uptime' 2>/dev/null | grep -q 'System uptime'"]
      interval: 10s
      timeout: 3s
      retries: 18
      start_period: 30s

  arbiter:
    build: ./arbiter
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      asterisk:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      ARI_URL: http://asterisk:8088/ari
      ARI_USER: pot
      ARI_PASS: pot
      ARI_APP: pot-queue
      QUEUE_ID: pot-queue
    ports:
      - "3000:3000"  # operator WS

  sipp:
    build: ./sipp-image
    profiles: ["driver"]
    depends_on:
      - asterisk
    volumes:
      - ./fixtures/sipp:/sipp:ro

  operator-sim:
    build: ./operator-sim
    profiles: ["driver"]
    depends_on:
      - arbiter
    environment:
      ARBITER_URL: ws://arbiter:3000
      ACCEPT_RATE_PER_SEC: "10"
      OPERATOR_COUNT: "10"
      DURATION_MS: "580000"   # 580 s emitting; 20 s warmup → 10 min total wall clock
      WARMUP_MS: "20000"
      OUTPUT_DIR: /app/results
