; S2 PoT — every inbound call hits Stasis(pot-queue) so arbiter sees StasisStart.
[globals]

[pot]
exten => 100,1,NoOp(S2 inbound from ${CHANNEL(peerip)})
 same => n,Answer()
 same => n,Stasis(pot-queue)
 same => n,Hangup()

; Catch-all so any URI lands in Stasis (defensive — SIPp scenario uses 100).
exten => _X.,1,NoOp(S2 catch-all ${EXTEN})
 same => n,Answer()
 same => n,Stasis(pot-queue)
 same => n,Hangup()
