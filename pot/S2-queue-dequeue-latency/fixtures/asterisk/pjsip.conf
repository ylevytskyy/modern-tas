; S2 PoT — UDP transport + anonymous inbound for SIPp.
; PJSIP looks up an endpoint named literally "anonymous" when an INVITE
; arrives that doesn't match any other endpoint / identifier — that's how
; we accept unauthenticated SIPp calls.

[global]
type=global
endpoint_identifier_order=ip,username,anonymous

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[anonymous]
type=endpoint
context=pot
disallow=all
allow=ulaw
allow=alaw
direct_media=no
