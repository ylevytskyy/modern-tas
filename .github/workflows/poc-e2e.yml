name: poc-e2e
on:
  push:
    branches: ['mvp/**', 'main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

jobs:
  e2e-s1:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    env:
      INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
      APP_JWT_SECRET:     ${{ secrets.APP_JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build workspace packages so @tas/db etc. resolve to ./dist/ as their
      # exports field declares. The Playwright spec imports @tas/db on the
      # runner (outside Docker) and needs dist artifacts on disk.
      - run: pnpm --filter @tas/shared-types --filter @tas/db --filter @tas/ari-client run build

      # Fast-fail vitest unit tests before the slow compose boot. The api
      # tests run later (testcontainers needs Docker; we co-locate them with
      # the rest of the api-side checks).
      - run: pnpm --filter @tas/temporal-worker run test
      - run: pnpm --filter @tas/web run test
      - run: pnpm --filter @tas/e2e run test

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm --filter @tas/e2e exec playwright install --with-deps chromium

      - run: make poc-up-all-docker

      # Pre-pull SIPp so `docker compose run --rm sipp` from runScenario
      # doesn't burn the CI screen-pop budget on image fetch.
      - run: docker pull sieteunoseis/sipp@sha256:9183ba7b21f49edcf028e30f9a086d5fa0fad3984caf9f15a05aea474de9bdd3

      - run: make poc-seed

      - run: pnpm --filter @tas/api run test

      - run: make poc-e2e-s1

      - if: failure()
        run: |
          mkdir -p /tmp/compose-logs
          docker compose -f infra/docker-compose.yml -f infra/docker-compose.all-in.yml \
            logs --no-color --tail=2000 > /tmp/compose-logs/all.log || true

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-${{ github.run_id }}
          path: |
            apps/e2e/playwright-report/
            apps/e2e/test-results/
            /tmp/compose-logs/

      - if: always()
        run: docker compose -f infra/docker-compose.yml -f infra/docker-compose.all-in.yml down -v || true
