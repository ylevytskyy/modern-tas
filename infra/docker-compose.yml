# tas PoC stack — services grow through Tasks 8–15.
# Chunk 1 scope: Postgres+Supavisor, Asterisk, MinIO, NATS, Redis, Temporal, Caddy.
# SBC tier (*.deferred/) removed per ADR-0025 — Asterisk-direct topology (Chunk 5 Phase 0).
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tas
      POSTGRES_DB: tas
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - pg-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 2s
      retries: 10

  supavisor-migrate:
    image: supabase/supavisor:1.1.66
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:tas@postgres:5432/_supavisor
      SECRET_KEY_BASE: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      VAULT_ENC_KEY: "0123456789abcdef0123456789abcdef"
      API_JWT_SECRET: "poc-only-not-prod"
      METRICS_JWT_SECRET: "poc-only-not-prod"
      REGION: "local"
      ERL_AFLAGS: "-proto_dist inet_tcp"
      RELEASE_COOKIE: "cookie"
      RELEASE_NODE: "supavisor-migrate@127.0.0.1"
    entrypoint: ["/app/bin/supavisor", "eval", "Supavisor.Release.migrate"]
    restart: "no"

  supavisor:
    image: supabase/supavisor:1.1.66
    # Supavisor's /app/limits.sh calls `ulimit -n 100000` which fails on
    # GitHub Actions runners ("cannot modify limit: Operation not permitted").
    # Setting nofile at container-create time so limits.sh sees the value
    # already in place and exits cleanly. Local-dev hosts usually allow the
    # raise anyway; this is additive.
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    depends_on:
      postgres:
        condition: service_healthy
      supavisor-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://postgres:tas@postgres:5432/_supavisor
      SECRET_KEY_BASE: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      VAULT_ENC_KEY: "0123456789abcdef0123456789abcdef"
      API_JWT_SECRET: "poc-only-not-prod"
      METRICS_JWT_SECRET: "poc-only-not-prod"
      REGION: "local"
      ERL_AFLAGS: "-proto_dist inet_tcp"
      RELEASE_COOKIE: "cookie"
      RELEASE_NODE: "supavisor@127.0.0.1"
    ports:
      - "6543:6543"
      # Admin API port 4000 is NOT published to host — use `docker compose exec supavisor` for admin calls
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15

  asterisk:
    build:
      context: ./asterisk
    volumes:
      - ./asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./asterisk/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./asterisk/ari.conf:/etc/asterisk/ari.conf:ro
      - ./asterisk/http.conf:/etc/asterisk/http.conf:ro
      - ./asterisk/modules.conf:/etc/asterisk/modules.conf:ro
      - recordings:/var/spool/asterisk/recording
    ports:
      - "${ASTERISK_SIP_HOST_PORT:-5060}:5060/udp"
      - "${ASTERISK_ARI_HOST_PORT:-8088}:8088"
    healthcheck:
      test: ["CMD-SHELL", "asterisk -rx 'core show uptime' | grep -q 'System uptime'"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2024-03-15T01-07-19Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tas
      MINIO_ROOT_PASSWORD: tas12345
      MC_HOST_local: "http://tas:tas12345@localhost:9000"
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "${NATS_HOST_PORT:-4222}:4222"
      - "${NATS_MONITOR_HOST_PORT:-8222}:8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8222/healthz | grep -q ok"]
      interval: 3s
      timeout: 2s
      retries: 8

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 8

  temporal:
    image: temporalio/auto-setup:1.22.4
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PWD: tas
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${TEMPORAL_HOST_PORT:-7233}:7233"
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address $(hostname -i):7233 2>&1 | grep -q SERVING || tctl --address $(hostname -i):7233 cluster health 2>&1 | grep -q SERVING"]
      interval: 8s
      timeout: 3s
      retries: 15

  temporal-ui:
    image: temporalio/ui:2.21.3
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      temporal:
        condition: service_healthy
    ports:
      - "${TEMPORAL_UI_HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080 > /dev/null 2>&1 && echo ok || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 10

  caddy:
    image: caddy:2.10-alpine
    volumes:
      - ./caddy/Caddyfile.local:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "443:443"
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- --no-check-certificate https://localhost 2>/dev/null | head -c 1 | grep -q . || curl -k -s -o /dev/null -w '%{http_code}' https://localhost | grep -qE '^[0-9]'"]
      interval: 5s
      timeout: 3s
      retries: 8

volumes:
  pg-data:
  recordings:
  minio-data:
  caddy-data:
  caddy-config:
