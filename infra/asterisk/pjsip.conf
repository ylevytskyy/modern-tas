[global]
type=global

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

[carrier-sipp]
type=endpoint
context=tas-inbound
disallow=all
allow=ulaw
allow=alaw
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
aors=carrier-sipp

[carrier-sipp]
type=aor
max_contacts=4

[carrier-sipp]
type=identify
endpoint=carrier-sipp
match=0.0.0.0/0  ; PoC-only — narrow to carrier IP(s) before any non-local deployment
